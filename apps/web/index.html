<!DOCTYPE html>
<html lang="el">
  <head>
    <meta charset="UTF-8" /><!-- build -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#E65100" />

    <!-- Performance: preconnect to font CDN -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="dns-prefetch" href="https://images.unsplash.com" />

    <!-- #12: preload primary font stylesheet (parallel with HTML parse, not blocked by JS) -->
    <link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400;12..96,500;12..96,600;12..96,700&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400;12..96,500;12..96,600;12..96,700&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" media="print" onload="this.media='all'" />

    <meta name="description" content="GlobiPet — Η #1 πλατφόρμα για κατοικίδια. Υπηρεσίες, κατάστημα, τηλεϊατρική, GPS tracker και κοινότητα." />
    <meta name="keywords" content="κατοικίδια, pet, grooming, κτηνίατρος, pet sitting, pet taxi, GPS tracker" />
    <!-- Open Graph -->
    <meta property="og:title" content="GlobiPet — Best care for the best human's friends" />
    <meta property="og:description" content="Βρείτε υπηρεσίες, προϊόντα και κοινότητα για τα κατοικίδιά σας." />
    <meta property="og:image" content="/logo.png" />
    <meta property="og:url" content="https://globipet.com" />
    <meta property="og:type" content="website" />
    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="GlobiPet" />
    <meta name="twitter:description" content="Η #1 πλατφόρμα για κατοικίδια" />
    <meta name="twitter:image" content="/logo.png" />
    <!-- Canonical -->
    <link rel="canonical" href="https://globipet.com" />
    <link rel="icon" type="image/png" href="/logo.png" />
    <link rel="apple-touch-icon" href="/logo.png" />
    <title>GlobiPet — Best care for the best human's friends</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
